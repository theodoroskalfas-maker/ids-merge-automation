name: Merge Jobs to Locatiebezoek
run-name: "Merge Jobs [${{ inputs.fwcId || 'manual' }}]"

on:
  workflow_dispatch:
    inputs:
      fwcId:
        description: "Field Work Cycle record ID to merge"
        required: true
        type: string

jobs:
  merge:
    runs-on: ubuntu-latest
    timeout-minutes: 120  # generous ceiling; a 4,000-location run should finish well under this

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run merge script
        env:
          ZOHO_API_KEY: ${{ secrets.ZOHO_API_KEY }}
          FWC_ID: ${{ inputs.fwcId }}
        run: node merge-jobs.js
