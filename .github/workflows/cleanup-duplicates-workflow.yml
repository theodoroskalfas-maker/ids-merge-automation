name: Cleanup Duplicate Jobs
run-name: "Cleanup Duplicate Jobs [${{ inputs.configRecordId || 'manual' }}]"

on:
  workflow_dispatch:
    inputs:
      configRecordId:
        description: "Job_Automation_Config record ID to clean up (scoped to its FWC field)"
        required: true
        type: string

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # GitHub Actions max (6 hours) — large duplicate sets with batch size 50 need room

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run cleanup script
        env:
          ZOHO_API_KEY: ${{ secrets.ZOHO_API_KEY }}
          CONFIG_RECORD_ID: ${{ github.event.inputs.configRecordId }}
        run: node cleanup-duplicates.js
