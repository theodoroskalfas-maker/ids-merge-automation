<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Actions Status</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
    <script src="https://live.zwidgets.com/js-sdk/1.2/ZohoEmbededAppSDK.min.js"></script>
</head>
<body>
    <!-- Top bar -->
    <div class="topbar">
        <div class="topbar-left">
            <svg class="topbar-icon" viewBox="0 0 16 16" fill="currentColor">
                <path fill-rule="evenodd" d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
            </svg>
            <span class="topbar-title" id="widgetTitle">Workflow Status</span>
        </div>
        <div class="topbar-right">
            <button id="btnRefresh" class="btn-icon" title="Refresh now">
                <svg viewBox="0 0 16 16" fill="currentColor" width="14" height="14">
                    <path d="M8 3a5 5 0 104.546 2.914.5.5 0 01.908-.418A6 6 0 118 2v1z"/>
                    <path d="M8 4.466V.534a.25.25 0 01.41-.192l2.36 1.966c.12.1.12.284 0 .384L8.41 4.658A.25.25 0 018 4.466z"/>
                </svg>
            </button>
            <span id="autoRefreshBadge" class="badge badge-live">LIVE</span>
        </div>
    </div>

    <!-- Loading state -->
    <div id="loadingState" class="state-container">
        <div class="spinner"></div>
        <p class="state-text">Loading workflow runs...</p>
    </div>

    <!-- Error state -->
    <div id="errorState" class="state-container" style="display:none;">
        <svg class="state-icon state-icon-error" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>
        </svg>
        <p id="errorMessage" class="state-text">Failed to load workflow data.</p>
        <button id="btnRetry" class="btn-secondary">Retry</button>
    </div>

    <!-- Empty state -->
    <div id="emptyState" class="state-container" style="display:none;">
        <svg class="state-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="9" x2="15" y2="9"/><line x1="9" y1="13" x2="15" y2="13"/><line x1="9" y1="17" x2="12" y2="17"/>
        </svg>
        <p class="state-text">No workflow runs found yet.</p>
    </div>

    <!-- Main content -->
    <div id="mainContent" style="display:none;">
        <!-- Stats row -->
        <div class="stats-row">
            <div class="stat-card">
                <span class="stat-value" id="statTotal">0</span>
                <span class="stat-label">Total Runs</span>
            </div>
            <div class="stat-card">
                <span class="stat-value stat-success" id="statSuccess">0</span>
                <span class="stat-label">Succeeded</span>
            </div>
            <div class="stat-card">
                <span class="stat-value stat-failure" id="statFailed">0</span>
                <span class="stat-label">Failed</span>
            </div>
            <div class="stat-card">
                <span class="stat-value stat-running" id="statRunning">0</span>
                <span class="stat-label">Running</span>
            </div>
        </div>

        <!-- Active run banner (shown only when a run is in progress) -->
        <div id="activeRunBanner" class="active-run-banner" style="display:none;">
            <div class="active-run-header">
                <div class="pulse-dot"></div>
                <span class="active-run-title">Run in progress</span>
                <span id="activeRunDuration" class="active-run-duration"></span>
            </div>
            <div class="progress-bar-container">
                <div id="activeRunProgress" class="progress-bar"></div>
            </div>
            <div class="active-run-details">
                <span id="activeRunWorkflow" class="mono"></span>
                <a id="activeRunLink" class="btn-link" href="#" target="_blank">View on GitHub &rarr;</a>
            </div>
        </div>

        <!-- Run list -->
        <div id="runList" class="run-list"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
